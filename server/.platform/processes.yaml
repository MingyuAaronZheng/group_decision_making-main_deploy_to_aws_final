version: 1
processes:
  http:        # for normal HTTP
    command: >
      gunicorn --bind :8000 --workers 3 server.wsgi:application
    port: 8000

  websocket:   # for Channels / Daphne
    command: >
      daphne -b 0.0.0.0 -p 5000 server.asgi:application
    port: 5000
    healthcheck_path: /ws/healthz     # any lightweight view you like
