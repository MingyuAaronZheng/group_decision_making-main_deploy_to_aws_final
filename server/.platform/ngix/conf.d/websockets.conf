
location /ws/ {
    proxy_pass         http://127.0.0.1:5000;  # Daphne
    proxy_http_version 1.1;                    # needed for Upgrade
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "Upgrade";
    proxy_set_header   Host $host;
    proxy_read_timeout 3600s;                  # keep the socket open
    proxy_send_timeout 3600s;
}