# inside http { … } – EB Linux 2 already opens the context for *.conf files
# ----------------------------------------------------------------------

# 1) helper: correct Connection header after the Upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 2) WebSocket traffic  ──► Daphne 5000
upstream daphne_backend { server 127.0.0.1:5000; }

location /ws/ {
    proxy_pass         http://daphne_backend;
    proxy_http_version 1.1;

    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_set_header   Host              $host;

    # optional but recommended
    proxy_read_timeout  600s;
    proxy_send_timeout  600s;
    proxy_buffering     off;
}

# 3) every other request  ──► Gunicorn 8000
upstream gunicorn_backend { server 127.0.0.1:8000; }

location / {
    proxy_pass         http://gunicorn_backend;
    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;
}
