# server-level file – we are already *inside* a server block.

# Everything that starts with /ws/ -> Daphne on :5000
location /ws/ {
    proxy_pass         http://127.0.0.1:5000;
    proxy_http_version 1.1;

    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# ⬅️ **DO NOT add another “location / { … }”**.
#     Beanstalk already created one in 00_application.conf; adding
#     another causes the “duplicate location '/'” error you saw:contentReference[oaicite:4]{index=4}.
